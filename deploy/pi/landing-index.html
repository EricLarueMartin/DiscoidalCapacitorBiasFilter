<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="0; url=/discoidal-capacitor-bias-filter/">
    <title>Agent Project Host</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17202a;
        --muted: #5b6670;
        --paper: #f5f2ea;
        --panel: #fffdf8;
        --line: #c9c1b0;
        --accent: #1f6f78;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        font-family: Arial, Helvetica, sans-serif;
        color: var(--ink);
        background: var(--paper);
      }

      main {
        width: min(42rem, 100%);
        padding: 2rem;
        background: var(--panel);
        border: 1px solid var(--line);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.8rem, 4vw, 3rem);
        line-height: 1;
      }

      p {
        margin: 0 0 1rem;
        color: var(--muted);
        line-height: 1.5;
      }

      a {
        color: var(--accent);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Agent Project Host</h1>
      <p>Redirecting to the Discoidal Capacitor Bias Filter project.</p>
      <p><a href="/discoidal-capacitor-bias-filter/">Open Discoidal Capacitor Bias Filter</a></p>
    </main>
  </body>
</html>
